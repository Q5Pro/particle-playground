<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Playground</title>
<style>
  :root {
    --bg: #05070d;
    --panel: rgba(13, 18, 28, 0.88);
    --border: #1c2533;
    --text: #d7e0ee;
    --text-dim: #5f6c80;
    --accent: #6cf2c1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  .panel {
    position: fixed;
    top: 20px;
    left: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    backdrop-filter: blur(8px);
    max-width: 260px;
  }

  .panel .eyebrow {
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .panel h1 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: #f0f3f9;
  }

  .panel p {
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .control {
    margin-bottom: 10px;
  }

  .control label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .control label span.val {
    color: var(--accent);
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  .mode-buttons {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .mode-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 10.5px;
    cursor: pointer;
    transition: all 0.15s ease;
    min-width: 64px;
  }

  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(108, 242, 193, 0.08);
  }

  .stats {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--panel);
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .stats strong { color: var(--accent); }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="panel">
  <div class="eyebrow">Particle Playground</div>
  <h1>Fareyle parçacıkları etkile</h1>
  <p>Fareyi hareket ettir veya tıkla. Aşağıdaki modlardan birini seçerek farklı davranışlar deneyebilirsin.</p>

  <div class="mode-buttons" id="mode-buttons">
    <button class="mode-btn active" data-mode="attract">Çek</button>
    <button class="mode-btn" data-mode="repel">İt</button>
    <button class="mode-btn" data-mode="swirl">Girdap</button>
    <button class="mode-btn" data-mode="none">Serbest</button>
  </div>

  <div class="control">
    <label>Parçacık Sayısı <span class="val" id="count-val">220</span></label>
    <input type="range" id="count" min="40" max="600" value="220">
  </div>
  <div class="control">
    <label>Etki Yarıçapı <span class="val" id="radius-val">160</span></label>
    <input type="range" id="radius" min="40" max="400" value="160">
  </div>
  <div class="control">
    <label>Kuvvet <span class="val" id="force-val">2.0</span></label>
    <input type="range" id="force" min="0.2" max="6" step="0.1" value="2.0">
  </div>
</div>

<div class="stats" id="stats">FPS: <strong id="fps">--</strong></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const state = {
  mode: 'attract',
  count: 220,
  radius: 160,
  force: 2.0,
  mouse: { x: width / 2, y: height / 2, active: false },
};

const HUE_BASE = 165; // teal/mint tonları civarında

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.6;
    this.baseSize = 1 + Math.random() * 2;
    this.hueOffset = (Math.random() - 0.5) * 40;
  }

  update() {
    const { mouse, mode, radius, force } = state;

    if (mouse.active && mode !== 'none') {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;

      if (dist < radius) {
        const strength = (1 - dist / radius) * force;

        if (mode === 'attract') {
          this.vx += (dx / dist) * strength * 0.18;
          this.vy += (dy / dist) * strength * 0.18;
        } else if (mode === 'repel') {
          this.vx -= (dx / dist) * strength * 0.18;
          this.vy -= (dy / dist) * strength * 0.18;
        } else if (mode === 'swirl') {
          // Teğetsel (dik) yönde kuvvet uygulayarak girdap etkisi yarat
          this.vx += (-dy / dist) * strength * 0.22;
          this.vy += (dx / dist) * strength * 0.22;
        }
      }
    }

    // Sürtünme (hız sonsuza kadar artmasın)
    this.vx *= 0.97;
    this.vy *= 0.97;

    this.x += this.vx;
    this.y += this.vy;

    // Kenarlardan yumuşak geri sekme
    if (this.x < 0) { this.x = 0; this.vx *= -1; }
    if (this.x > width) { this.x = width; this.vx *= -1; }
    if (this.y < 0) { this.y = 0; this.vy *= -1; }
    if (this.y > height) { this.y = height; this.vy *= -1; }
  }

  draw() {
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const size = this.baseSize + Math.min(speed * 1.5, 3);
    const hue = HUE_BASE + this.hueOffset + Math.min(speed * 8, 40);

    ctx.beginPath();
    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 85%, 68%, 0.85)`;
    ctx.fill();
  }
}

let particles = [];

function initParticles(count) {
  particles = Array.from({ length: count }, () => new Particle());
}

function drawConnections() {
  // Yakın parçacıklar arasında ince çizgiler çiz (sinir ağı / takımyıldız hissi)
  ctx.lineWidth = 0.5;
  const maxConnDist = 70;

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distSq = dx * dx + dy * dy;

      if (distSq < maxConnDist * maxConnDist) {
        const dist = Math.sqrt(distSq);
        const alpha = (1 - dist / maxConnDist) * 0.15;
        ctx.strokeStyle = `hsla(${HUE_BASE}, 80%, 70%, ${alpha})`;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
}

let lastFrameTime = performance.now();
let frameCount = 0;
let fpsAccum = 0;
const fpsEl = document.getElementById('fps');

function animate() {
  const now = performance.now();
  const dt = now - lastFrameTime;
  lastFrameTime = now;
  frameCount++;
  fpsAccum += dt;
  if (fpsAccum >= 500) {
    fpsEl.textContent = Math.round(1000 / (fpsAccum / frameCount));
    frameCount = 0;
    fpsAccum = 0;
  }

  ctx.fillStyle = 'rgba(5, 7, 13, 0.25)';
  ctx.fillRect(0, 0, width, height);

  // Performans için bağlantı çizimini parçacık sayısına göre sınırla
  if (particles.length <= 250) {
    drawConnections();
  }

  particles.forEach((p) => {
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}

// --- Etkileşim ---
canvas.addEventListener('mousemove', (e) => {
  state.mouse.x = e.clientX;
  state.mouse.y = e.clientY;
  state.mouse.active = true;
});
canvas.addEventListener('mouseleave', () => {
  state.mouse.active = false;
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  state.mouse.x = touch.clientX;
  state.mouse.y = touch.clientY;
  state.mouse.active = true;
}, { passive: false });

document.querySelectorAll('.mode-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
  });
});

const countSlider = document.getElementById('count');
const radiusSlider = document.getElementById('radius');
const forceSlider = document.getElementById('force');

countSlider.addEventListener('input', () => {
  state.count = parseInt(countSlider.value, 10);
  document.getElementById('count-val').textContent = state.count;
  initParticles(state.count);
});
radiusSlider.addEventListener('input', () => {
  state.radius = parseInt(radiusSlider.value, 10);
  document.getElementById('radius-val').textContent = state.radius;
});
forceSlider.addEventListener('input', () => {
  state.force = parseFloat(forceSlider.value);
  document.getElementById('force-val').textContent = state.force.toFixed(1);
});

initParticles(state.count);
animate();
</script>
</body>
</html>
